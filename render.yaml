# GreenTouch.pro — Render blueprint (single service, persistent data)
# Deploy: push to GitHub, then at https://render.com → New → Blueprint,
# pick this repo. Render reads this file and provisions everything.
#
# WHY Docker + disk: the bot and dashboard share ONE SQLite database.
# The persistent disk keeps that database (and its backups) across every
# deploy and restart — this is your single archived source of truth.
services:
  - type: web
    name: greentouch-pro
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter                 # $7/mo — REQUIRED for the persistent disk
    healthCheckPath: /api/health
    autoDeploy: true
    disk:
      name: greentouch-data
      mountPath: /data            # hermes.db + backups live here, survive deploys
      sizeGB: 1
    envVars:
      - key: PORT
        value: "4000"
      - key: DATA_DIR
        value: /data
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true       # Render generates a strong secret
      - key: CORS_ORIGINS
        value: "*"
      - key: DASHBOARD_URL
        value: https://app.greentouch.pro
      # --- Secrets you paste in the Render dashboard (marked sync:false) ---
      - key: TELEGRAM_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENROUTER_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: LEADERSHIP_EMAILS
        sync: false
      - key: SUPABASE_DB_URL
        sync: false